<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>
        LOGIN FORM
    </h1>

    <form action="">
        <label for="userName">
           Name
           <input type="text" placeholder="Enter name" name="userName">
        </label>

        <label for="password">
            password 
            <input type="password" name="password">
        </label>

        <label for="Games">
            <select name="Games" id="">
                <option value="Cricket">Cricket</option>
                <option value="Hockey">Hockey</option>
                <option value="FootBall">FootBall</option>
                <option value="Badminton">Racket</option>
            </select>
        </label>
        <label for="progress">
            progresss 
            <input type="range" name="progress" id="">
        </label>

        <input type="color">
    </form>
</body>
</html>
