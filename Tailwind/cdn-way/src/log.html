<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-500 flex justify-center items-center min-h-screen">
    <div class="bg-gray-800 rounded-lg p-9 shadow-lg max-w-sm w-full">
    <h2 class="text-white text-center text-4xl p-5 font-bold">Login</h2>
        <form action="">
            <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-200 mb-6 text-center ">
                Email <input type="email" name="email" class="w-full px-2 py-2 bg-gray-300 rounded-md">
            </label>
            </div>

            <div>
            <label for="Password" class="block text-sm font-medium text-gray-200 mb-6 text-center">
                Password <input type="password" name="password" class="w-full px-2 py-2 bg-gray-300 rounded-md border-solid outline-2 outline-blue-500">
            </label>

            <button type="submit" class="rounded-full w-full bg-gray-50 px-3 py-1 text-center" >Submit</button>
            </div>
        </form>
</div>
</body>
</html>
